<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Hologram video (Pepper’s Ghost)</title>
  <link rel="manifest" href="manifest.webmanifest" />

  <style>
    :root{
      --bg:#000;
      --fg:#eaeaea;
      --muted:#a9a9a9;
      --card: rgba(17,17,17,.85);
      --border: rgba(255,255,255,.12);

      /* zoom pryč */
      --zoom: 1;

      /* poměr videa (w/h) */
      --ratio: 1;

      /* kompozice = celý viewport (žádné okraje) */
      --stageW: 100vw;
      --stageH: 100vh;

      /* VIDEO = 1/3 šířky, protože uprostřed je mezera šířky videa */
      --videoW: calc(var(--stageW) / 3);
      --videoH: calc(var(--videoW) / var(--ratio));

      /* STŘEDNÍ MEZERA = přesně šířka videa */
      --gap: var(--videoW);
    }

    html, body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--fg);
      overflow:hidden;
      font: 16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* STAGE vždy fullscreen, bez okrajů */
    .stage{
      position:fixed;
      inset:0;
      width:var(--stageW);
      height:var(--stageH);
      background:#000;
      overflow:hidden;
      touch-action: manipulation;
    }

    /* UI jako overlay (nemění rozměry stage) */
    .ui{
      position:fixed;
      left:0; right:0;
      top:0;
      padding: max(10px, env(safe-area-inset-top)) 10px 10px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      pointer-events:auto;
      z-index:10;
    }


    .btn, .file{
      background:var(--card);
      border:1px solid var(--border);
      color:var(--fg);
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
      user-select:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      text-decoration:none;
      -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(6px);
    }
    .btn[disabled]{ opacity:.45; cursor:not-allowed; }
    input[type="file"]{ display:none; }

    .chip{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:999px;
      padding:8px 10px;
      color:var(--muted);
      font-size:13px;
      display:flex;
      gap:8px;
      align-items:center;
      backdrop-filter: blur(6px);
    }
    .chip strong{ color:var(--fg); font-weight:650; }

    /* Pomocné čáry: jen ve středovém "slotu" (stejné rozměry jako video) */
    .centerGuides{
      position:absolute;
      left:50%;
      top:50%;
      width: var(--gap);      /* = videoW */
      height: var(--videoH);  /* = videoH (logicky, střední slot má být jako video) */
      transform: translate(-50%, -50%);
      pointer-events:none;
      background: rgba(0,0,0,.80);
      background-image:
        linear-gradient(45deg, transparent 49.4%, rgba(255,255,255,.75) 50%, transparent 50.6%),
        linear-gradient(-45deg, transparent 49.4%, rgba(255,255,255,.75) 50%, transparent 50.6%);
      box-shadow: 0 0 0 1px rgba(255,255,255,.12) inset;
      opacity: .55;
      z-index:2;
    }

    /* 4 videa */
    .v{
      position:absolute;
      width: var(--videoW);
      height: var(--videoH);
      object-fit: cover;
      background:#000;
      transform-origin:center;
      z-index:1;
    }

    /*
      Rozmístění do 3×3 mřížky:
      x: 0 .. videoW .. 2videoW .. 3videoW(=100vw)
      y: 0 .. videoH .. 2videoH .. 3videoH (může přesahovat -> ořízne se)
      Videím dáme střední sloupec/řádek:
        top:    (videoW, 0)
        bottom: (videoW, 2videoH)
        left:   (0, videoH)
        right:  (2videoW, videoH)
    */
    .top    { left: var(--videoW); top: 0; }
    .bottom { left: var(--videoW); top: calc(var(--videoH) * 2); }
    .left   { left: 0;            top: var(--videoH); }
    .right  { left: calc(var(--videoW) * 2); top: var(--videoH); }

    /* rotace Pepper’s Ghost */
    .mode-standard .top    { transform: rotate(180deg) scale(var(--zoom)); }
    .mode-standard .bottom { transform: rotate(0deg)   scale(var(--zoom)); }
    .mode-standard .left   { transform: rotate(90deg)  scale(var(--zoom)); }
    .mode-standard .right  { transform: rotate(-90deg) scale(var(--zoom)); }

    .mode-invert .top    { transform: rotate(0deg)   scale(var(--zoom)); }
    .mode-invert .bottom { transform: rotate(180deg) scale(var(--zoom)); }
    .mode-invert .left   { transform: rotate(-90deg) scale(var(--zoom)); }
    .mode-invert .right  { transform: rotate(90deg)  scale(var(--zoom)); }

    /* Pure režim = schovej overlay UI úplně */
    body.pureMode .ui{ display:none !important; }
  </style>
</head>

<body>
  <!-- overlay UI -->
  <div class="ui" id="ui">
    <div class="group">
      <label class="file btn" for="fileInput" title="Nahraj video">📹 Nahrát</label>
      <input id="fileInput" type="file" accept="video/*" />
      <button class="btn" id="demoBtn" title="Načíst demo (demo.mp4 vedle indexu)">🦋 Demo</button>
      <button class="btn" id="modeBtn" disabled>🔄 Režim</button>
      <div class="chip">Režim: <strong id="modeLabel">Standard</strong></div>
    </div>

    <div class="group">
      <button class="btn" id="ratioBtn" disabled>📐 1:1 / Auto</button>
      <div class="chip">Poměr: <strong id="ratioLabel">1:1</strong></div>
      <button class="btn" id="playBtn" disabled>▶︎ / ⏸︎</button>
      <button class="btn" id="muteBtn" disabled>🔇 / 🔊</button>
      <button class="btn" id="loopBtn" disabled>🔁 Loop: ON</button>
    </div>
  </div>

  <!-- stage fullscreen -->
  <div class="stage mode-standard" id="stage" title="Dvojklik: čistý režim / zpět">
    <div class="centerGuides" aria-hidden="true"></div>

    <!-- master video (pro captureStream, skryté) -->
    <video id="vMaster" playsinline style="position:absolute;width:1px;height:1px;left:-9999px;top:-9999px;"></video>

    <!-- 4 synchronizovaná videa -->
    <video class="v top"    id="vTop"    playsinline></video>
    <video class="v bottom" id="vBottom" playsinline></video>
    <video class="v left"   id="vLeft"   playsinline></video>
    <video class="v right"  id="vRight"  playsinline></video>
  </div>

  <script>
    // PWA SW
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

    const els = {
      fileInput: document.getElementById('fileInput'),
      demoBtn: document.getElementById('demoBtn'),
      modeBtn: document.getElementById('modeBtn'),
      modeLabel: document.getElementById('modeLabel'),
      ratioBtn: document.getElementById('ratioBtn'),
      ratioLabel: document.getElementById('ratioLabel'),
      playBtn: document.getElementById('playBtn'),
      muteBtn: document.getElementById('muteBtn'),
      loopBtn: document.getElementById('loopBtn'),
      stage: document.getElementById('stage'),
      vids: {
        master: document.getElementById('vMaster'),
        top: document.getElementById('vTop'),
        bottom: document.getElementById('vBottom'),
        left: document.getElementById('vLeft'),
        right: document.getElementById('vRight'),
      }
    };

    let currentURL = null;

    let streamMode = false;
    let lastStream = null;

    let mode = localStorage.getItem('holoMode') || 'standard';
    let loopOn = (localStorage.getItem('holoLoop') ?? '1') === '1';
    let muted = (localStorage.getItem('holoMuted') ?? '1') === '1';

    let ratioMode = localStorage.getItem('holoRatioMode') || 'square'; // square | auto
    let originalRatio = 1;

    function setEnabled(enabled){
      els.modeBtn.disabled = !enabled;
      els.ratioBtn.disabled = !enabled;
      els.playBtn.disabled = !enabled;
      els.muteBtn.disabled = !enabled;
      els.loopBtn.disabled = !enabled;
    }

    function setMode(newMode){
      mode = newMode;
      els.stage.classList.toggle('mode-standard', mode === 'standard');
      els.stage.classList.toggle('mode-invert', mode === 'invert');
      els.modeLabel.textContent = (mode === 'standard') ? 'Standard' : 'Invert';
      localStorage.setItem('holoMode', mode);
    }

    function setLoop(on){
      loopOn = on;
      localStorage.setItem('holoLoop', loopOn ? '1' : '0');
      els.loopBtn.textContent = '🔁 Loop: ' + (loopOn ? 'ON' : 'OFF');

      els.vids.master.loop = loopOn;
      if (!streamMode){
        for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) v.loop = loopOn;
      }
    }

    function setMuted(on){
      muted = on;
      localStorage.setItem('holoMuted', muted ? '1' : '0');
      els.muteBtn.textContent = muted ? '🔇 / 🔊' : '🔊 / 🔇';

      els.vids.master.muted = muted;

      if (!streamMode){
        for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) v.muted = muted;
      } else {
        for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) v.muted = true;
      }
    }

    function setRatioMode(m){
      ratioMode = m;
      localStorage.setItem('holoRatioMode', ratioMode);
      if (ratioMode === 'auto'){
        document.documentElement.style.setProperty('--ratio', originalRatio);
        els.ratioLabel.textContent = 'Auto';
      } else {
        document.documentElement.style.setProperty('--ratio', 1);
        els.ratioLabel.textContent = '1:1';
      }
    }

    // fallback sync pro 4x <video src>
    let syncTimer = null;
    function startSync(){
      stopSync();
      syncTimer = setInterval(() => {
        const ref = els.vids.bottom;
        if (!ref || ref.readyState < 2 || ref.seeking) return;

        const t = ref.currentTime;

        for (const v of Object.values(els.vids)) {
          if (v === ref) continue;
          if (v.readyState < 2 || v.seeking) continue;

          const dt = v.currentTime - t;
          const adt = Math.abs(dt);

          if (adt > 0.6) { v.currentTime = t; v.playbackRate = 1; continue; }
          if (adt > 0.10) v.playbackRate = (dt > 0) ? 0.96 : 1.04;
          else v.playbackRate = 1;

          if (ref.paused && !v.paused) v.pause();
          if (!ref.paused && v.paused) v.play().catch(()=>{});
        }
      }, 400);
    }
    function stopSync(){
      if (syncTimer) clearInterval(syncTimer);
      syncTimer = null;
      for (const v of Object.values(els.vids)) v.playbackRate = 1;
    }

    async function loadVideoFromURL(url){
      if (currentURL && currentURL.startsWith('blob:')) URL.revokeObjectURL(currentURL);
      currentURL = url;

      streamMode = false;
      lastStream = null;
      for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) {
        try { v.srcObject = null; } catch(e) {}
      }

      const master = els.vids.master;
      master.src = url;
      master.playsInline = true;
      master.preload = 'auto';
      master.loop = loopOn;
      master.muted = muted;

      await new Promise((resolve, reject) => {
        const ok = () => { cleanup(); resolve(); };
        const err = () => { cleanup(); reject(new Error('load fail')); };
        const cleanup = () => {
          master.removeEventListener('loadedmetadata', ok);
          master.removeEventListener('error', err);
        };
        master.addEventListener('loadedmetadata', ok, { once:true });
        master.addEventListener('error', err, { once:true });
      });

      originalRatio = (master.videoWidth && master.videoHeight) ? (master.videoWidth / master.videoHeight) : 1;
      setRatioMode(ratioMode);

      setEnabled(true);

      try { await master.play(); } catch(e) {}

      // captureStream prefer
      if (master.captureStream) {
        try{
          lastStream = master.captureStream();
          streamMode = true;

          for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) {
            v.srcObject = lastStream;
            v.playsInline = true;
            v.preload = 'auto';
            v.muted = true;
            v.loop = false;
          }
          for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) {
            try { await v.play(); } catch(e) {}
          }
          stopSync();
          return;
        }catch(e){
          streamMode = false;
          lastStream = null;
          for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) {
            try { v.srcObject = null; } catch(_) {}
          }
        }
      }

      // fallback 4x src
      for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) {
        v.src = url;
        v.playsInline = true;
        v.preload = 'auto';
        v.loop = loopOn;
        v.muted = muted;
      }

      startSync();
      for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) {
        try { await v.play(); } catch(e) {}
      }
    }

    // dblclick -> pure mode
    document.addEventListener("dblclick", () => {
      if (els.modeBtn.disabled) return;
      document.body.classList.toggle("pureMode");
    });

    // UI events
    els.fileInput.addEventListener('change', async (e) => {
      const f = e.target.files?.[0];
      if (!f) return;
      const url = URL.createObjectURL(f);
      try { await loadVideoFromURL(url); }
      catch { alert('Video se nepodařilo načíst.'); }
    });

    els.demoBtn.addEventListener('click', async () => {
      try { await loadVideoFromURL('./demo.mp4'); }
      catch { alert('Demo není k dispozici (přidej demo.mp4 vedle index.html), nebo nahraj vlastní video.'); }
    });

    els.modeBtn.addEventListener('click', () => setMode(mode === 'standard' ? 'invert' : 'standard'));
    els.ratioBtn.addEventListener('click', () => setRatioMode(ratioMode === 'square' ? 'auto' : 'square'));
    els.muteBtn.addEventListener('click', () => setMuted(!muted));
    els.loopBtn.addEventListener('click', () => setLoop(!loopOn));

    els.playBtn.addEventListener('click', async () => {
      const master = els.vids.master;
      const ref = streamMode ? master : els.vids.bottom;

      if (ref.paused){
        try{ await master.play(); }catch(e){}
        for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) { try{ await v.play(); }catch(e){} }
      } else {
        for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) v.pause();
        master.pause();
      }
    });

    // init
    setMode(mode);
    setLoop(loopOn);
    setMuted(muted);
    try { setRatioMode(ratioMode); } catch(e) {}
    setEnabled(false);
  </script>
</body>
</html>
