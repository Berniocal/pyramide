<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Hologram video (Pepper’s Ghost)</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root{
      --bg:#000;
      --fg:#eaeaea;
      --muted:#a9a9a9;
      --card:#111;
      --border:#222;
      --accent:#7dd3fc;

      /* velikost kompozice (fix) */
      --size: min(72vmin, 620px);

      /* mezera uprostřed (pro špičku pyramidy) */
      --gap: 10px;

      /* zoom videí (fix 1×) */
      --zoom: 1;

      /* poměr stran videa (šířka / výška) */
      --ratio: 1;

      /* šířka a výška jednoho videa */
      --videoW: calc((var(--size) - var(--gap) * 2) / 2);
      --videoH: calc(var(--videoW) / var(--ratio));
    }

    html,body{height:100%;}
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font: 16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap{
      display:grid;
      grid-template-rows:auto 1fr auto;
      min-height:100%;
      padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
      box-sizing:border-box;
      gap: 12px;
    }

    header{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    h1{
      font-size:18px;
      margin:0;
      font-weight:650;
      letter-spacing:.2px;
    }

    .panel{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
    }

    .btn, .file{
      background:var(--card);
      border:1px solid var(--border);
      color:var(--fg);
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
      user-select:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      text-decoration:none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover{ border-color:#2b2b2b; }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{ border-color: #2a2a2a; box-shadow: 0 0 0 1px rgba(125,211,252,.2) inset; }
    .btn.primary:hover{ border-color: rgba(125,211,252,.6); }
    .btn[disabled]{ opacity:.45; cursor:not-allowed; transform:none; }

    input[type="file"]{ display:none; }

    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:center;
    }

    .chip{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:999px;
      padding:8px 10px;
      color:var(--muted);
      font-size:13px;
      display:flex;
      gap:8px;
      align-items:center;
    }
    .chip strong{ color:var(--fg); font-weight:650; }

    /* Hologram stage */
    .stageWrap{
      display:grid;
      place-items:center;
      width:100%;
    }
    .stage{
      width:var(--size);
      height:var(--size);
      position:relative;
      background:#000;
      border:1px solid #111;
      border-radius:18px;
      overflow:hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      touch-action: manipulation; /* zlepší dvojklik na mobilech */
    }

    .guide{
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.25;
    }
    .guide::before, .guide::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:#fff;
      opacity:.25;
    }
    .guide::before{ width:2px; height:100%; }
    .guide::after{ height:2px; width:100%; }

    /* 4 videa rozmístěná do kříže */
    .v{
      position:absolute;
      width: var(--videoW);
      height: var(--videoH);
      object-fit: cover; /* vyplní čtverec, ořeže */
      background:#000;
      filter: saturate(1.05) contrast(1.05);
      transform-origin:center;
    }

    /* středový “mrtvý” čtverec (kam se opírá špička pyramidy) */
    .centerHole{
      position:absolute;
      width: calc(var(--gap) * 2);
      height: calc(var(--gap) * 2);
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      background:#000;
      overflow:hidden;
      background-image:
        linear-gradient(45deg, transparent 49.5%, rgba(255,255,255,.6) 50%, transparent 50.5%),
        linear-gradient(-45deg, transparent 49.5%, rgba(255,255,255,.6) 50%, transparent 50.5%);
      border-radius:10px;
    }

    /* pozice */
    .top    { left:50%; top: calc(50% - var(--gap) - var(--videoH)); }
    .bottom { left:50%; top: calc(50% + var(--gap)); }
    .left   { left: calc(50% - var(--gap) - var(--videoW)); top:50%; }
    .right  { left: calc(50% + var(--gap)); top:50%; }

    /* rotace pro Pepper’s Ghost (standardní “pyramida na telefonu”) + ZOOM (fix 1×) */
    .mode-standard .top    { transform:translateX(-50%) rotate(180deg) scale(var(--zoom)); }
    .mode-standard .bottom { transform:translateX(-50%) rotate(0deg)   scale(var(--zoom)); }
    .mode-standard .left   { transform:translateY(-50%) rotate(90deg)  scale(var(--zoom)); }
    .mode-standard .right  { transform:translateY(-50%) rotate(-90deg) scale(var(--zoom)); }

    /* alternativní rotace + ZOOM (fix 1×) */
    .mode-invert .top    { transform:translateX(-50%) rotate(0deg)   scale(var(--zoom)); }
    .mode-invert .bottom { transform:translateX(-50%) rotate(180deg) scale(var(--zoom)); }
    .mode-invert .left   { transform:translateY(-50%) rotate(-90deg) scale(var(--zoom)); }
    .mode-invert .right  { transform:translateY(-50%) rotate(90deg)  scale(var(--zoom)); }

    footer{
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }

    /* Fullscreen: ať se stage roztáhne */
    :fullscreen .wrap,
    :-webkit-full-screen .wrap{
      padding: 0;
      grid-template-rows:auto 1fr auto;
    }
    :fullscreen .stage,
    :-webkit-full-screen .stage{
      width:100vw !important;
      height:100vh !important;
      border-radius:0;
      border:none;
      box-shadow:none;
    }

    /* --- ČISTÝ HOLOGRAM REŽIM (jen video, bez ovládání) --- */
    body.pureMode header,
    body.pureMode .controls,
    body.pureMode footer{
      display:none !important;
    }
    body.pureMode .wrap{
      padding:0 !important;
      grid-template-rows:1fr !important;
      gap:0 !important;
    }
    body.pureMode .stageWrap{
      place-items:stretch !important;
    }
    body.pureMode .stage{
      width:100vw !important;
      height:100vh !important;
      border:none !important;
      border-radius:0 !important;
      box-shadow:none !important;
    }
    body.pureMode{
      --size: 100vmin !important;
    }
    body.pureMode .guide{ opacity:0; } /* v čistém režimu bez kříže */
  </style>
</head>

<body>
  <div class="wrap" id="app">
    <header>
      <h1>Hologram video (Pepper’s Ghost) – 4× zrcadlení</h1>
      <div class="panel">
        <label class="file btn primary" for="fileInput" title="Nahraj video">
          📹 Nahrát video
        </label>
        <input id="fileInput" type="file" accept="video/*" />
        <button class="btn" id="demoBtn" title="Načíst demo (pokud existuje soubor demo.mp4 vedle indexu)">
          🦋 Demo
        </button>
        <button class="btn" id="fsBtn" title="Celá obrazovka" disabled>
          ⛶ Fullscreen
        </button>
      </div>
    </header>

    <div class="controls">
      <div class="chip">
        Režim: <strong id="modeLabel">Standard</strong>
      </div>
      <button class="btn" id="modeBtn" disabled>🔄 Přepnout režim</button>

      <div class="chip">
        Střed / Velikost: <strong id="gapLabel">10px</strong>
      </div>
      <!-- jeden slider ovládá gap a tím i velikost videí -->
      <input id="gapRange" type="range" min="0" max="120" value="10" style="width:240px" disabled />

      <div class="chip">
        Poměr: <strong id="ratioLabel">1:1</strong>
      </div>
      <button class="btn" id="ratioBtn" disabled>📐 1:1 / Auto</button>

      <button class="btn" id="playBtn" disabled>▶︎ / ⏸︎</button>
      <button class="btn" id="muteBtn" disabled>🔇 / 🔊</button>
      <button class="btn" id="loopBtn" disabled>🔁 Loop: ON</button>
    </div>

    <main class="stageWrap">
      <div class="stage mode-standard" id="stage" title="Dvojklik: čistý fullscreen režim / zpět">
        <div class="guide"></div>
        <div class="centerHole"></div>

        <!-- master video (pro captureStream, skryté) -->
        <video id="vMaster" playsinline style="position:absolute;width:1px;height:1px;left:-9999px;top:-9999px;"></video>

        <!-- 4 synchronizovaná videa -->
        <video class="v top"    id="vTop"    playsinline></video>
        <video class="v bottom" id="vBottom" playsinline></video>
        <video class="v left"   id="vLeft"   playsinline></video>
        <video class="v right"  id="vRight"  playsinline></video>
      </div>
    </main>

    <footer>
      Tip: nejlepší efekt je u videí s <strong>černým pozadím</strong>. Dvojklik kdekoliv přepne čistý fullscreen hologram.
    </footer>
  </div>

  <script>
    // --- PWA registrace service workeru ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

    const els = {
      fileInput: document.getElementById('fileInput'),
      demoBtn: document.getElementById('demoBtn'),
      fsBtn: document.getElementById('fsBtn'),
      modeBtn: document.getElementById('modeBtn'),
      modeLabel: document.getElementById('modeLabel'),
      stage: document.getElementById('stage'),
      gapRange: document.getElementById('gapRange'),
      gapLabel: document.getElementById('gapLabel'),
      ratioBtn: document.getElementById('ratioBtn'),
      ratioLabel: document.getElementById('ratioLabel'),
      playBtn: document.getElementById('playBtn'),
      muteBtn: document.getElementById('muteBtn'),
      loopBtn: document.getElementById('loopBtn'),
      vids: {
        master: document.getElementById('vMaster'),
        top: document.getElementById('vTop'),
        bottom: document.getElementById('vBottom'),
        left: document.getElementById('vLeft'),
        right: document.getElementById('vRight'),
      }
    };

    let currentURL = null;

    let streamMode = false;
    let lastStream = null;

    // nastavení uložené v localStorage
    let mode = localStorage.getItem('holoMode') || 'standard'; // 'standard' | 'invert'
    let loopOn = (localStorage.getItem('holoLoop') ?? '1') === '1';
    let muted = (localStorage.getItem('holoMuted') ?? '1') === '1'; // default muted = ON (autoplay friendly)
    let pure = false; // čistý režim fullscreen

    let ratioMode = localStorage.getItem('holoRatioMode') || 'square'; // 'square' | 'auto'
    let originalRatio = 1;

    // zoom je zrušený (fix 1×)
    document.documentElement.style.setProperty('--zoom', 1);

    function setEnabled(enabled){
      if (els.fsBtn) els.fsBtn.disabled = !enabled;
      if (els.modeBtn) els.modeBtn.disabled = !enabled;
      if (els.gapRange) els.gapRange.disabled = !enabled;
      if (els.ratioBtn) els.ratioBtn.disabled = !enabled;
      if (els.playBtn) els.playBtn.disabled = !enabled;
      if (els.muteBtn) els.muteBtn.disabled = !enabled;
      if (els.loopBtn) els.loopBtn.disabled = !enabled;
    }

    function setMode(newMode){
      mode = newMode;
      els.stage.classList.toggle('mode-standard', mode === 'standard');
      els.stage.classList.toggle('mode-invert', mode === 'invert');
      els.modeLabel.textContent = (mode === 'standard') ? 'Standard' : 'Invert';
      localStorage.setItem('holoMode', mode);
    }

    function setLoop(on){
      loopOn = on;
      localStorage.setItem('holoLoop', loopOn ? '1' : '0');
      els.loopBtn.textContent = '🔁 Loop: ' + (loopOn ? 'ON' : 'OFF');

      els.vids.master.loop = loopOn;
      if (!streamMode){
        for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) v.loop = loopOn;
      }
    }

    function setMuted(on){
      muted = on;
      localStorage.setItem('holoMuted', muted ? '1' : '0');
      els.muteBtn.textContent = muted ? '🔇 / 🔊' : '🔊 / 🔇';

      // master řídí zvuk
      els.vids.master.muted = muted;

      // kopie v režimu stream jsou vždy ztlumené
      if (!streamMode){
        for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) v.muted = muted;
      } else {
        for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) v.muted = true;
      }
    }

    function applyGap(px){
      document.documentElement.style.setProperty('--gap', `${px}px`);
      els.gapLabel.textContent = `${px}px`;
      localStorage.setItem('holoGap', String(px));
    }

    function setRatioMode(mode){
      ratioMode = mode;
      localStorage.setItem('holoRatioMode', ratioMode);
      if (ratioMode === 'auto'){
        document.documentElement.style.setProperty('--ratio', originalRatio);
        if (els.ratioLabel) els.ratioLabel.textContent = 'Auto';
      } else {
        document.documentElement.style.setProperty('--ratio', 1);
        if (els.ratioLabel) els.ratioLabel.textContent = '1:1';
      }
    }

    // synchronizace přehrávání a času (jednoduchá, robustní)
    let syncTimer = null;
    function startSync(){
      stopSync();
      syncTimer = setInterval(() => {
        const ref = els.vids.bottom;
        if (!ref || ref.readyState < 2 || ref.seeking) return;

        const t = ref.currentTime;

        for (const v of Object.values(els.vids)) {
          if (v === ref) continue;
          if (v.readyState < 2 || v.seeking) continue;

          const dt = v.currentTime - t;
          const adt = Math.abs(dt);

          // Když ujel hodně, udělej jen občasný skok (jinak by to cukalo pořád)
          if (adt > 0.6) {
            v.currentTime = t;
            v.playbackRate = 1.0;
            continue;
          }

          // Jemné dorovnání bez skoků v čase
          if (adt > 0.10) {
            v.playbackRate = (dt > 0) ? 0.96 : 1.04;
          } else {
            v.playbackRate = 1.0;
          }

          if (ref.paused && !v.paused) v.pause();
          if (!ref.paused && v.paused) v.play().catch(()=>{});
        }
      }, 400);
    }
    function stopSync(){
      if (syncTimer) clearInterval(syncTimer);
      syncTimer = null;
      // Vrať rychlost zpět na normál (když se sync vypne nebo restartuje)
      for (const v of Object.values(els.vids)) v.playbackRate = 1.0;
    }

    async function loadVideoFromURL(url){
      // uvolnit starý blob
      if (currentURL && currentURL.startsWith('blob:')) URL.revokeObjectURL(currentURL);
      currentURL = url;

      // zruš případný starý stream
      streamMode = false;
      lastStream = null;
      for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) {
        try { v.srcObject = null; } catch(e) {}
      }

      const master = els.vids.master;

      // nastav master
      master.src = url;
      master.playsInline = true;
      master.preload = 'auto';
      master.loop = loopOn;
      master.muted = muted;

      // počkat na metadata
      await new Promise((resolve, reject) => {
        const onOk = () => { cleanup(); resolve(); };
        const onErr = () => { cleanup(); reject(new Error('Nelze načíst video')); };
        const cleanup = () => {
          master.removeEventListener('loadedmetadata', onOk);
          master.removeEventListener('error', onErr);
        };
        master.addEventListener('loadedmetadata', onOk, { once:true });
        master.addEventListener('error', onErr, { once:true });
      });

      // uložit originální poměr videa (šířka / výška) a aplikovat režim poměru
      originalRatio = (master.videoWidth && master.videoHeight) ? (master.videoWidth / master.videoHeight) : 1;
      setRatioMode(ratioMode);

      setEnabled(true);

      // pokus o autoplay masteru (na mobilu většinou jen když je muted)
      try { await master.play(); } catch(e) {}

      // --- Preferovaný režim: captureStream (1× dekódování, 4× zobrazení) ---
      if (master.captureStream) {
        try{
          lastStream = master.captureStream();
          streamMode = true;

          for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) {
            v.srcObject = lastStream;
            v.playsInline = true;
            v.preload = 'auto';
            // kopie vždy muted (hlas řídí master)
            v.muted = true;
            // loop řídí master
            v.loop = false;
          }

          // rozběhnout kopie
          for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) {
            try { await v.play(); } catch(e) {}
          }

          // v režimu stream není potřeba sync
          stopSync();
          return;
        }catch(e){
          // captureStream selhalo → fallback
          streamMode = false;
          lastStream = null;
          for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) {
            try { v.srcObject = null; } catch(_) {}
          }
        }
      }

      // --- Fallback: původní 4× <video src> + jemná synchronizace ---
      for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) {
        v.src = url;
        v.playsInline = true;
        v.preload = 'auto';
        v.loop = loopOn;
        v.muted = muted;
      }

      startSync();

      for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) {
        try { await v.play(); } catch(e) {}
      }
    }

    // --- ČISTÝ FULLSCREEN REŽIM (dvojklik) ---
    async function enterPureMode(){
      pure = true;
      document.body.classList.add("pureMode");
      if (!document.fullscreenElement){
        try { await document.documentElement.requestFullscreen(); } catch(e) {}
      }
    }

    async function exitPureMode(){
      pure = false;
      document.body.classList.remove("pureMode");
      if (document.fullscreenElement){
        try { await document.exitFullscreen(); } catch(e) {}
      }
    }

    // dvojklik kdekoliv
    document.addEventListener("dblclick", (e) => {
      // Když ještě není video načtené, dvojklik nic nedělá
      if (els.fsBtn.disabled) return;

      if (pure) exitPureMode();
      else enterPureMode();
    });

    // když uživatel vypne fullscreen jinak (gestem), vrať UI
    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement && pure){
        pure = false;
        document.body.classList.remove("pureMode");
      }
    });

    // --- UI události ---
    els.fileInput.addEventListener('change', async (e) => {
      const f = e.target.files?.[0];
      if (!f) return;
      const url = URL.createObjectURL(f);
      try{
        await loadVideoFromURL(url);
      }catch(err){
        alert('Video se nepodařilo načíst.');
      }
    });

    els.demoBtn.addEventListener('click', async () => {
      try{
        await loadVideoFromURL('./demo.mp4');
      }catch(err){
        alert('Demo není k dispozici. Nahraj vlastní video (nebo přidej demo.mp4 vedle index.html).');
      }
    });

    els.modeBtn.addEventListener('click', () => {
      setMode(mode === 'standard' ? 'invert' : 'standard');
    });

    els.playBtn.addEventListener('click', async () => {
      const master = els.vids.master;
      const ref = streamMode ? master : els.vids.bottom;

      if (ref.paused){
        try{ await master.play(); }catch(e){}
        for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) { try{ await v.play(); }catch(e){} }
      } else {
        for (const v of [els.vids.top, els.vids.bottom, els.vids.left, els.vids.right]) v.pause();
        master.pause();
      }
    });

    els.muteBtn.addEventListener('click', () => setMuted(!muted));
    els.loopBtn.addEventListener('click', () => setLoop(!loopOn));

    els.gapRange.addEventListener('input', (e) => applyGap(Number(e.target.value)));

    if (els.ratioBtn) {
      els.ratioBtn.addEventListener('click', () => {
        setRatioMode(ratioMode === 'square' ? 'auto' : 'square');
      });
    }

    els.fsBtn.addEventListener('click', async () => {
      // klasické tlačítko necháváme jako alternativu
      if (!document.fullscreenElement){
        try{ await document.documentElement.requestFullscreen(); }catch(e){}
      } else {
        try{ await document.exitFullscreen(); }catch(e){}
      }
    });

    // --- načíst uložené nastavení ---
    setMode(mode);

    const savedGap  = Number(localStorage.getItem('holoGap')  || 10);
    els.gapRange.value = String(savedGap);
    applyGap(savedGap);

    // výchozí poměr před načtením videa
    try{ setRatioMode(ratioMode); }catch(e){}

    setLoop(loopOn);
    setMuted(muted);

    setEnabled(false);
  </script>
</body>
</html>
